{% extends 'custom_admin/base.html' %}
{% block login_content %}
<head>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0a58ca;
            --text-main: #1F2E4D;
            --text-muted: #64748b;
            --card-radius: 24px;
        }

        body {
            font-family: 'Outfit', sans-serif !important;
        }

        .login-page-wrapper {
            background: linear-gradient(135deg, #f0f4ff 0%, #e2e8f0 100%);
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .ambient-shape {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13, 110, 253, 0.1) 0%, rgba(13, 110, 253, 0) 70%);
            z-index: 0;
        }
        .shape-1 { top: -100px; right: -100px; }
        .shape-2 { bottom: -100px; left: -100px; }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--card-radius);
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            z-index: 1;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
        }

        .login-title {
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .form-label {
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem;
            color: #fff;
            font-weight: 700;
            margin-top: 1.5rem;
            width: 100%;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<div class="login-page-wrapper">
    <div class="ambient-shape shape-1"></div>
    <div class="ambient-shape shape-2"></div>
    
    <div class="login-card text-center">
        <div class="brand-icon">
            <i class="bi bi-key-fill"></i>
        </div>
        
        <h1 class="login-title">Forgot Password</h1>
        <p class="login-subtitle">Enter your email and we'll send you an OTP to reset your password.</p>

        {% if error %}
        <div class="alert alert-danger" style="border-radius: 12px; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4 text-start">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required autofocus>
            </div>
            
            <button type="submit" class="login-btn">
                <span>Send OTP</span>
            </button>
        </form>

        <div class="back-link">
            <a href="{% url 'custom_admin:login' %}"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
