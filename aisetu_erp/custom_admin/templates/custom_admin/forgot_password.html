{% extends 'custom_admin/base.html' %}
{% block login_content %}
<head>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-radius: 1.5rem;
        }

        .login-page-wrapper {
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.05), transparent),
                        #f8fafc;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: var(--card-radius);
            padding: 3.5rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            z-index: 1;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: white;
            font-size: 2.25rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .login-title {
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.875rem;
            margin-bottom: 0.75rem;
            text-align: center;
            letter-spacing: -0.025em;
        }

        .login-subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 3rem;
            font-size: 1rem;
        }

        .form-label {
            color: #475569;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #fff;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .login-btn {
            background: var(--primary);
            border: none;
            border-radius: 0.75rem;
            padding: 1rem;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 2rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
        }

        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.3);
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9375rem;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        .main-content {
            padding: 0 !important;
        }
    </style>
</head>

    <div class="login-card text-center">
        <div class="brand-icon">
            <i class="bi bi-key-fill"></i>
        </div>
        
        <h1 class="login-title">Reset Password</h1>
        <p class="login-subtitle">Enter your email and we'll send you an OTP.</p>
        <div class="brand-icon">
            <i class="bi bi-key-fill"></i>
        </div>
        
        <h1 class="login-title">Forgot Password</h1>
        <p class="login-subtitle">Enter your email and we'll send you an OTP to reset your password.</p>

        {% if error %}
        <div class="alert alert-danger" style="border-radius: 12px; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4 text-start">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required autofocus>
            </div>
            
            <button type="submit" class="login-btn">
                <span>Send OTP</span>
            </button>
        </form>

        <div class="back-link">
            <a href="{% url 'custom_admin:login' %}"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
