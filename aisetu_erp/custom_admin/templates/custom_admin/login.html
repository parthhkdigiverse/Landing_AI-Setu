{% extends 'custom_admin/base.html' %}
{% block login_content %}
<head>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0a58ca;
            --text-main: #1F2E4D;
            --text-muted: #64748b;
            --card-radius: 24px;
        }

        body {
            font-family: 'Outfit', sans-serif !important;
        }

        .login-page-wrapper {
            background: linear-gradient(135deg, #f0f4ff 0%, #e2e8f0 100%);
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background shapes */
        .ambient-shape {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13, 110, 253, 0.1) 0%, rgba(13, 110, 253, 0) 70%);
            z-index: 0;
        }
        .shape-1 { top: -100px; right: -100px; }
        .shape-2 { bottom: -100px; left: -100px; }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--card-radius);
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
            box-shadow: 0 10px 15px -3px rgba(13, 110, 253, 0.3);
        }

        .login-title {
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .form-label {
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            outline: none;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1.5rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(13, 110, 253, 0.2);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(13, 110, 253, 0.3);
            opacity: 0.95;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            z-index: 10;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* Override base.html styles for the login container */
        .main-content {
            padding: 0 !important;
            background: none !important;
        }
    </style>
</head>

<div class="login-page-wrapper">
    <div class="ambient-shape shape-1"></div>
    <div class="ambient-shape shape-2"></div>
    
    <div class="login-card">
        <div class="brand-icon">
            <i class="bi bi-box-fill"></i>
        </div>
        
        <h1 class="login-title">AI-Setu Admin</h1>
        <p class="login-subtitle">Welcome back! Please enter your details.</p>

        {% if error %}
        <div class="alert alert-danger d-flex align-items-center" style="border-radius: 12px; font-size: 0.9rem;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <div>{{ error }}</div>
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success d-flex align-items-center" style="border-radius: 12px; font-size: 0.9rem;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <div>{{ success }}</div>
        </div>
        {% endif %}

        <form method="post" action="{% url 'custom_admin:login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="admin@aisetuerp.com" required autofocus>
            </div>
            
            <div class="mb-5">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label mb-0" for="password">Password</label>
                    <a href="{% url 'custom_admin:forgot_password' %}" class="text-primary text-decoration-none fw-600" style="font-size: 0.8rem;">Forgot Password?</a>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" style="padding-right: 3rem;" required>
                    <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="login-btn">
                <span>Sign In to Admin</span>
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const toggleIcon = document.querySelector('#toggleIcon');

        togglePassword.addEventListener('click', function() {
            // Toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // Toggle the icon
            toggleIcon.classList.toggle('bi-eye');
            toggleIcon.classList.toggle('bi-eye-slash');
        });
    });
</script>
{% endblock %}
