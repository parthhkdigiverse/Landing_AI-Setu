{% extends 'custom_admin/base.html' %}
{% block login_content %}
<div class="card shadow border-0" style="width: 100%; max-width: 400px; border-radius: 12px;">
    <div class="card-body p-5">
        <h3 class="card-title text-center text-primary fw-bold mb-4">AI-Setu Admin</h3>
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="{% url 'custom_admin:login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-muted fw-bold small">Email address</label>
                <input type="email" name="email" class="form-control form-control-lg" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted fw-bold small">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Login to Admin Panel</button>
        </form>
    </div>
</div>
{% endblock %}
