{% extends 'custom_admin/base.html' %}
{% block content %}
<div class="pt-3 pb-2 mb-4 border-bottom">
    <h1 class="h2 text-danger fw-bold">Confirm Deletion</h1>
</div>
<div class="card shadow-sm border-0 mx-auto" style="max-width: 600px;">
    <div class="card-body text-center p-5">
        <div class="display-1 text-danger mb-4"><i class="bi bi-exclamation-circle"></i></div>
        <h4 class="mb-3 fw-bold">Are you sure you want to delete this {{ model_name }}?</h4>
        <p class="text-muted mb-5">"<strong>{{ object }}</strong>" will be permanently deleted. This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <a href="{% url 'custom_admin:model_list' app_label model_slug %}" class="btn btn-light border px-4 me-2">Cancel</a>
            <button type="submit" class="btn btn-danger px-4 shadow-sm">Yes, Delete</button>
        </form>
    </div>
</div>
{% endblock %}
