{% extends 'custom_admin/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-4">
    <h1 class="h2 fw-bold">{{ model_name_plural }}</h1>
    <a href="{% url 'custom_admin:model_create' app_label model_slug %}" class="btn btn-primary px-4 shadow-sm"><i class="bi bi-plus-lg"></i> Add New</a>
</div>
<div class="card shadow-sm border-0">
    <div class="card-body p-0 table-responsive">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr>
                    <th class="px-4 py-3">Record Information</th>
                    <th class="text-end px-4 py-3">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for object in object_list %}
                <tr>
                    <td class="px-4"><strong>{{ object }}</strong></td>
                    <td class="text-end text-nowrap px-4 py-3">
                        <a href="{% url 'custom_admin:model_update' app_label model_slug object.pk %}" class="btn btn-sm btn-light border"><i class="bi bi-pencil"></i> Edit</a>
                        <a href="{% url 'custom_admin:model_delete' app_label model_slug object.pk %}" class="btn btn-sm btn-outline-danger ms-1"><i class="bi bi-trash"></i> Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center py-5 text-muted">No records found. Click "Add New" to get started.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
