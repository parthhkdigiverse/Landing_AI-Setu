{% extends 'custom_admin/base.html' %}
{% block login_content %}
<head>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-radius: 1.5rem;
        }

        .login-page-wrapper {
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.05), transparent),
                        #f8fafc;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: var(--card-radius);
            padding: 3.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            z-index: 1;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: white;
            font-size: 2.25rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .login-title {
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.875rem;
            margin-bottom: 0.75rem;
            text-align: center;
            letter-spacing: -0.025em;
        }

        .login-subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 3rem;
            font-size: 1rem;
        }

        .otp-input-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .otp-field {
            width: 52px;
            height: 64px;
            text-align: center;
            font-size: 1.75rem;
            font-weight: 800;
            border-radius: 1rem;
            border: 2px solid #e2e8f0;
            background: #fff;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--primary);
        }

        .otp-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
            transform: translateY(-2px);
        }

        .login-btn {
            background: var(--primary);
            border: none;
            border-radius: 0.75rem;
            padding: 1rem;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
        }

        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.3);
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9375rem;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        .main-content {
            padding: 0 !important;
        }
    </style>
</head>

<div class="login-page-wrapper">
    <div class="login-card text-center">
        <div class="brand-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        
        <h1 class="login-title">Verify OTP</h1>
        <p class="login-subtitle">We've sent a 6-digit code to <strong>{{ email }}</strong>. Please enter it below.</p>

        {% if error %}
        <div class="alert alert-danger" style="border-radius: 12px; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" id="otpForm">
            {% csrf_token %}
            <div class="otp-input-container">
                <input type="text" maxlength="1" class="otp-field" pattern="\d*" inputmode="numeric" required>
                <input type="text" maxlength="1" class="otp-field" pattern="\d*" inputmode="numeric" required>
                <input type="text" maxlength="1" class="otp-field" pattern="\d*" inputmode="numeric" required>
                <input type="text" maxlength="1" class="otp-field" pattern="\d*" inputmode="numeric" required>
                <input type="text" maxlength="1" class="otp-field" pattern="\d*" inputmode="numeric" required>
                <input type="text" maxlength="1" class="otp-field" pattern="\d*" inputmode="numeric" required>
            </div>
            <input type="hidden" name="otp" id="fullOtp">
            
            <button type="submit" class="login-btn">
                <span>Verify & Continue</span>
            </button>
        </form>

        <div class="back-link">
            <a href="{% url 'custom_admin:forgot_password' %}">Resend OTP</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const fields = document.querySelectorAll('.otp-field');
        const fullOtpInput = document.querySelector('#fullOtp');
        const form = document.querySelector('#otpForm');

        fields.forEach((field, index) => {
            field.addEventListener('input', (e) => {
                if (e.target.value && index < fields.length - 1) {
                    fields[index + 1].focus();
                }
                updateFullOtp();
            });

            field.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    fields[index - 1].focus();
                }
            });
        });

        function updateFullOtp() {
            let otp = '';
            fields.forEach(field => otp += field.value);
            fullOtpInput.value = otp;
        }

        form.addEventListener('submit', function(e) {
            updateFullOtp();
        });

        // Focus first field on load
        fields[0].focus();
    });
</script>
{% endblock %}
